<!DOCTYPE html>
<html style="height: 100%; width: 100%;" lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kōdan</title>
    <style>
      textarea::placeholder { color: #BFBFBF; }
      input::placeholder { color: #BFBFBF; }
      textarea {
        color: #404040;
        border: 1px solid #D9D9D9;
        border-radius: 8px;
        padding: 6px 8px;
        resize: none;
        height: 60px;
      }
      input {
        color: #404040;
        border: 1px solid #D9D9D9;
        border-radius: 8px;
        padding: 6px 8px;
        resize: none;
      }
      .labelTop {
        margin: 0;
        color: #404040;
        font-size: 6px;
        font-weight: 800;
      }
      textarea:focus, input:focus {
        border-color: #D9D9D9;
        box-shadow: none;
      }
      button { cursor: pointer; }
      /* Hide the horizontal scrollbar on the scenes strip while keeping
         scroll behavior. Firefox gets `scrollbar-width: none`; Chromium /
         Electron / Safari go through the WebKit pseudo-element. */
      #bottom-bar { scrollbar-width: none; -ms-overflow-style: none; }
      #bottom-bar::-webkit-scrollbar { display: none; width: 0; height: 0; }
    </style>
  </head>
  <body style="margin: 0; height: 100%; width: 100%; display: flex;">
    <div id="root" style="height: 100%; width: 100%; display: flex;"></div>
    <script type="module" src="/src/index.js"></script>
  </body>
</html>

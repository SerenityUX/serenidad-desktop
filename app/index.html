<!DOCTYPE html>
<html style="height: 100%; width: 100%;" lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicons (universal, both Electron and web). Browsers pick the
         best size automatically; Apple Touch icon is used on iOS home
         screens; the manifest covers Android / PWA installs. -->
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Default head metadata. Per-project routes overwrite title + OG via a
         client-side hook (see src/hooks/useDocumentMeta.js). Crawlers that
         don't run JS will see this default — see deployment notes. -->
    <title>CoCreate Cafe</title>
    <meta name="description" content="CoCreate Cafe — an anime storyboard and short-film studio." />
    <meta name="theme-color" content="#1F93FF" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="CoCreate Cafe" />
    <meta property="og:title" content="CoCreate Cafe" />
    <meta property="og:description" content="Storyboard and direct anime shorts, scene by scene." />
    <meta property="og:image" content="/favicon.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CoCreate Cafe" />
    <meta name="twitter:description" content="Storyboard and direct anime shorts, scene by scene." />
    <meta name="twitter:image" content="/favicon.png" />
    <style>
      textarea::placeholder { color: #BFBFBF; }
      input::placeholder { color: #BFBFBF; }
      textarea {
        color: #404040;
        border: 1px solid #D9D9D9;
        border-radius: 8px;
        padding: 6px 8px;
        resize: none;
        height: 60px;
      }
      input {
        color: #404040;
        border: 1px solid #D9D9D9;
        border-radius: 8px;
        padding: 6px 8px;
        resize: none;
      }
      .labelTop {
        margin: 0;
        color: #404040;
        font-size: 6px;
        font-weight: 800;
      }
      textarea:focus, input:focus {
        border-color: #D9D9D9;
        box-shadow: none;
      }
      button { cursor: pointer; }
      /* Hide the horizontal scrollbar on the scenes strip while keeping
         scroll behavior. Firefox gets `scrollbar-width: none`; Chromium /
         Electron / Safari go through the WebKit pseudo-element. */
      #bottom-bar { scrollbar-width: none; -ms-overflow-style: none; }
      #bottom-bar::-webkit-scrollbar { display: none; width: 0; height: 0; }
    </style>
  </head>
  <body style="margin: 0; height: 100%; width: 100%; display: flex;">
    <div id="root" style="height: 100%; width: 100%; display: flex;"></div>
    <script type="module" src="/src/index.js"></script>
  </body>
</html>
